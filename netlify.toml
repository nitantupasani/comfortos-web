[build]
  command = "npm run build"
  publish = "dist"

# Vite bakes VITE_* vars into bundle at build time — dist/ scanning is a false positive.
# Firebase web config (projectId, apiKey, etc.) is public by design and meant to ship in the client.
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "dist,README.md,package.json,package-lock.json"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_APP_ID,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_MEASUREMENT_ID,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_GOOGLE_CLIENT_ID,VITE_API_BASE_URL"

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

# index.html and all HTML routes must never be cached so the next
# deploy is picked up immediately. Without this, iOS Safari hangs onto
# the old bundle pointer and serves stale JS even after a Netlify deploy.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, no-store"

# Fingerprinted JS / CSS bundles are safe to cache forever — Vite hashes
# the filename, so a new deploy produces a new URL.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
